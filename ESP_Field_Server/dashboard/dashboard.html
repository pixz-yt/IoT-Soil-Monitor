<!DOCTYPE html>
<html>

<head>

<title>Field Monitoring System</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    font-family:Arial;
    margin:20px;
    background:#2b2b2b;
    color:white;
}

.card{
    background:#3a3a3a;
    padding:15px;
    margin-bottom:20px;
    border-radius:10px;
    box-shadow:0px 0px 10px rgba(0,0,0,0.3);
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:1px solid #555;
    padding:10px;
    text-align:center;
}

th{
    background:#444;
}

canvas{
    max-height:400px;
}

.logo-header{
    display:flex;
    align-items:center;
    gap:20px;
}

.logo-header img{
    width:80px;
    height:80px;
    border-radius:50%;
}

.logo-title{
    margin:0;
    color:#ffd700;
}

.logo-subtitle{
    margin-top:5px;
    color:#cccccc;
}

</style>

</head>

<body>

<div class="card">

<div class="logo-header">

<img src="/logo.png">

<div>

<h1 class="logo-title">
Field Monitoring System
</h1>

<h3 class="logo-subtitle">
LOOSE WIRES ⚡
</h3>

</div>

</div>

<hr>

<h2 id="time">Time : --</h2>

<h2 id="temp">🌡 Temperature : -- °C</h2>

<h2 id="hum">💧 Humidity : -- %</h2>

<h2 id="status">Status : --</h2>

</div>

<div class="card">

<h2 style="color:#ffd700;">
DHT11 Sensor
</h2>

<canvas id="chart"></canvas>

</div>

<div class="card">

<h2>Latest Reading</h2>

<table>

<tr>
<th>Time</th>
<th>Temperature (°C)</th>
<th>Humidity (%)</th>
</tr>

<tr>
<td id="t1">--</td>
<td id="t2">--</td>
<td id="t3">--</td>
</tr>

</table>

</div>

<script>

let labels = ["Start"];
let tempData = [0];
let humData = [0];

const chart = new Chart(
document.getElementById("chart"),
{
type:"line",

data:{
labels:labels,

datasets:[
{
label:"Temperature",
data:tempData,
borderColor:"red",
backgroundColor:"red",
fill:false,
tension:0.4
},
{
label:"Humidity",
data:humData,
borderColor:"blue",
backgroundColor:"blue",
fill:false,
tension:0.4
}
]
},

options:{
responsive:true,
animation:false,

plugins:{
legend:{
labels:{
color:"white"
}
}
},

scales:{

x:{
ticks:{
color:"white"
},
grid:{
color:"#555"
}
},

y:{
beginAtZero:true,
ticks:{
color:"white"
},
grid:{
color:"#555"
}
}

}
}
});

async function updateData(){

let r = await fetch("/live");
let d = await r.json();

let now = new Date().toLocaleTimeString([], {
hour:'2-digit',
minute:'2-digit'
});

document.getElementById("time").innerHTML =
"Time : " + now;

document.getElementById("temp").innerHTML =
"🌡 Temperature : " + d.temp + " °C";

document.getElementById("hum").innerHTML =
"💧 Humidity : " + d.humidity + " %";

if(d.status == "ONLINE")
{
document.getElementById("status").innerHTML =
"🟢 ONLINE";
}
else
{
document.getElementById("status").innerHTML =
"🔴 OFFLINE";
}

document.getElementById("t1").innerHTML = now;
document.getElementById("t2").innerHTML = d.temp;
document.getElementById("t3").innerHTML = d.humidity;

labels.push("");
tempData.push(d.temp);
humData.push(d.humidity);

if(labels.length > 30)
{
labels.shift();
tempData.shift();
humData.shift();
}

chart.update();

}

updateData();

setInterval(updateData,1000);

</script>

</body>

</html>
